name: Database Migration

on:
  workflow_dispatch:
    inputs:
      direction:
        description: 'Migration direction'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - drop

jobs:
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate migration
        run: npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push migration
        if: inputs.direction == 'push'
        run: npm run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Drop migration
        if: inputs.direction == 'drop'
        run: npm run db:drop
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
